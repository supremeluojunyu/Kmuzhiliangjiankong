name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version || '1.0.0' }}"
          fi
          echo "name=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "code=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web (mobile mode)
        env:
          VITE_APP_MODE: mobile
          VITE_API_BASE_URL: ${{ vars.DEFAULT_API_URL || 'http://124.220.4.69:5555' }}
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Patch Android manifest
        env:
          APP_VERSION_NAME: ${{ steps.ver.outputs.name }}
          APP_VERSION_CODE: ${{ steps.ver.outputs.code }}
        run: bash scripts/patch-android.sh

      - name: Build debug APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Rename APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "dist-apk/uqm-quality-monitor-v${{ steps.ver.outputs.name }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/dist-apk/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/dist-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
