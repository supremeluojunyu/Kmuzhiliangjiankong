# FRP Proxy Protocol 网关：解析 frp 注入的真实客户端 IP，再转发到 Vite/前端
# 配合 frpc.toml 中 transport.proxyProtocolVersion = "v2" 与 localPort = 5180 使用
#
# 启动：docker compose -f docker-compose.frp-gateway.yml up -d

server {
    listen 127.0.0.1:5180 proxy_protocol;
    server_name _;

    # frpc 从本机连入
    set_real_ip_from 127.0.0.0/8;
    real_ip_header proxy_protocol;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
