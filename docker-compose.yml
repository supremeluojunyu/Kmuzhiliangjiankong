services:
  mysql:
    image: mysql:8.0
    container_name: uqm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-uqm}
      MYSQL_USER: ${DB_USER:-uqm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-uqm_dev_2026}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./backend/src/main/resources/db/seed-test-users.sql:/docker-entrypoint-initdb.d/03-seed-users.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: uqm-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uqm-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-uqm}
      DB_USER: ${DB_USER:-uqm}
      DB_PASSWORD: ${DB_PASSWORD:-uqm_dev_2026}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-uqm-jwt-secret-change-in-production-2026}
      UPLOAD_PATH: /data/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - upload_data:/data/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uqm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: uqm-minio
    profiles: ["oss"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  upload_data:
  minio_data:
