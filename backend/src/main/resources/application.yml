server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
      # 信任 FRP 服务器、Docker 网桥及常见内网代理
      internal-proxies: "127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|172\\.(1[6-9]|2\\d|3[0-1])\\.\\d{1,3}\\.\\d{1,3}|0:0:0:0:0:0:0:1|::1|124\\.220\\.4\\.69"

spring:
  application:
    name: university-quality-monitor
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mysql://localhost:3306/uqm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: uqm
    password: uqm_dev_2026
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

uqm:
  jwt:
    secret: uqm-jwt-secret-change-in-production-2026
    expiration-ms: 7200000
  upload:
    type: local
    path: /home/golden/university-quality-monitor/data/uploads
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      path-style-access: ${S3_PATH_STYLE:true}
  apk:
    path: /home/golden/university-quality-monitor/data/apk/uqmonitor-latest.apk

logging:
  level:
    com.uqm: info
    root: warn
