server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:uqm}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:uqm}
    password: ${DB_PASSWORD:uqm_dev_2026}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

uqm:
  jwt:
    secret: ${JWT_SECRET:uqm-jwt-secret-change-in-production-2026}
  upload:
    type: ${UPLOAD_TYPE:local}
    path: ${UPLOAD_PATH:/data/uploads}
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      path-style-access: ${S3_PATH_STYLE:true}

logging:
  level:
    com.uqm: info
    root: warn
